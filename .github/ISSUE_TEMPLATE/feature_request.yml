name: Feature request
description: Propose a new capability or product improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Help us evaluate this request with concrete use cases and tradeoffs.
  - type: dropdown
    id: component
    attributes:
      label: Related component
      description: Which part of the system does this feature relate to?
      options:
        - Gateway / orchestration
        - Agent runtime
        - Multi-tenant / RBAC
        - Channel integration (Feishu, WeChat, etc.)
        - Control UI (web dashboard)
        - LLM provider / model routing
        - Database / storage
        - Auth / JWT
        - CLI
        - Platform administration
        - Other
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One-line statement of the requested capability.
      placeholder: Support per-tenant token usage alerts when quota exceeds a configurable threshold.
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What user pain this solves and why current behavior is insufficient.
      placeholder: Tenant admins have no visibility into token consumption until they hit the hard quota limit, causing unexpected service interruption.
    validations:
      required: true
  - type: textarea
    id: proposed_solution
    attributes:
      label: Proposed solution
      description: Desired behavior/API/UX with as much specificity as possible.
      placeholder: Add a quotas.alertThreshold (0-100%) field in tenant settings. When usage exceeds the threshold, notify tenant owner via configured channel.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches considered and why they are weaker.
      placeholder: Manually checking the usage dashboard is error-prone and requires active monitoring.
  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: |
        Explain who benefits, severity/urgency, how often the pain occurs, and practical consequences.
        Include:
        - Affected users/tenants/roles
        - Severity (annoying, blocks workflow, etc.)
        - Frequency (always/intermittent/edge case)
        - Consequence (delays, errors, extra manual work, etc.)
      placeholder: |
        Affected: All tenant admins/owners
        Severity: Medium (no proactive alert before quota exhaustion)
        Frequency: Monthly (at billing cycle boundaries)
        Consequence: Unexpected agent downtime when quota is silently exhausted
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence/examples
      description: Prior art, links, screenshots, logs, or metrics.
      placeholder: Similar quota alert mechanism in AWS Budgets. Screenshot of current usage page showing no alert capability.
  - type: textarea
    id: additional_information
    attributes:
      label: Additional information
      description: Extra context, constraints, or references not covered above.
      placeholder: Should be backward-compatible with existing tenant quotas config.
